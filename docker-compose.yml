  #     - REDIS_URL=redis://redis:6379/0
  #     - OPENAI_API_KEY=${OPENAI_API_KEY}
  #   ports:
  #     - "8000:8000"
  #   volumes:
  #     - ./backend:/app
  #     - ./backend/uploads:/app/uploads
  #     - ./backend/outputs:/app/outputs
  #   depends_on:
